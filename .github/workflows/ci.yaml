name: CI

# O pipeline roda nestas situações:
on:
  push:
    branches: [ main ] # a cada push na main
  pull_request:
    branches: [ main ] # a cada PR com destino na main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # executa em um servidor Linux na nuvem

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # acelera instalações repetidas

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Linter (Ruff)
        run: ruff check .

      - name: Rodar Verificação de Tipos (Mypy)
        run: mypy . --ignore-missing-imports

      #- name: Rodar testes automatizados e Cobertura
      #  run: pytest -v --cov=. --cov-report=term-missing